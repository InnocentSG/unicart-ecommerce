<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart - Annurva</title>
  <link rel="stylesheet" href="cart.css">
</head>
<body>

  <!-- Header -->
  <header class="cart-header">
    <img src="../logo.png" alt="Annurva Logo" class="logo-img">
    <h1>My Cart</h1>
  </header>

  <!-- Cart Container -->
  <main class="cart-container">
    <!-- Left: Items -->
    <section class="cart-items">
      <div class="cart-item">
        <img src="../product1.jpg" alt="Product 1">
        <div class="item-details">
          <h2>Product 1</h2>
          <p>₹200</p>
          <div class="quantity-control">
            <button class="qty-btn" onclick="updateQty(this, -1)">−</button>
            <span class="qty">1</span>
            <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem(this)">Remove</button>
        </div>
      </div>

      <div class="cart-item">
        <img src="../product2.jpg" alt="Product 2">
        <div class="item-details">
          <h2>Product 2</h2>
          <p>₹400</p>
          <div class="quantity-control">
            <button class="qty-btn" onclick="updateQty(this, -1)">−</button>
            <span class="qty">2</span>
            <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem(this)">Remove</button>
        </div>
      </div>
    </section>

    <!-- Right: Price Summary -->
    <aside class="cart-summary">
      <h2>Price Details</h2>
      <div class="summary-row"><span>Price (3 items)</span> <span id="total-price">₹1000</span></div>
      <div class="summary-row"><span>Discount</span> <span class="discount">−₹100</span></div>
      <div class="summary-row"><span>Delivery Charges</span> <span>FREE</span></div>
      <hr>
      <div class="summary-row total"><span>Total Amount</span> <span id="final-price">₹900</span></div>
      <button class="checkout-btn">Proceed to Checkout</button>
    </aside>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Annurva. All rights reserved.</p>
  </footer>

  <script src="cart.js"></script>
</body>
</html>
